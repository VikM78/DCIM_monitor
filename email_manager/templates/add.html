<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Email Manager v{{ version }} - Добавить email</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        h1 {
            color: #333;
            margin-bottom: 10px;
        }
        .version {
            color: #667eea;
            font-size: 12px;
            margin-bottom: 20px;
            font-family: monospace;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 600;
        }
        input, textarea, select {
            width: 100%;
            padding: 10px;
            border: 2px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
            transition: border-color 0.3s;
        }
        input:focus, textarea:focus, select:focus {
            outline: none;
            border-color: #667eea;
        }
        textarea {
            resize: vertical;
            min-height: 80px;
        }
        .checkbox-group {
            display: flex;
            align-items: center;
        }
        .checkbox-group input {
            width: auto;
            margin-right: 10px;
        }
        .checkbox-group label {
            margin-bottom: 0;
        }
        .buttons {
            display: flex;
            gap: 10px;
            margin-top: 30px;
        }
        .btn {
            display: inline-block;
            padding: 10px 20px;
            background: #667eea;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            border: none;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 14px;
        }
        .btn:hover {
            background: #764ba2;
            transform: translateY(-2px);
        }
        .btn-secondary {
            background: #95a5a6;
        }
        .btn-secondary:hover {
            background: #7f8c8d;
        }
        .flash-messages {
            margin-bottom: 20px;
        }
        .flash {
            padding: 12px;
            border-radius: 5px;
            margin-bottom: 10px;
        }
        .flash.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        .flash.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        .required:after {
            content: " *";
            color: red;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>➕ Добавить новый email</h1>
        <div class="version">Версия: {{ version }}</div>

        <div class="flash-messages">
            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    {% for category, message in messages %}
                        <div class="flash {{ category }}">{{ message }}</div>
                    {% endfor %}
                {% endif %}
            {% endwith %}
        </div>

        <form method="POST">
            <div class="form-group">
                <label class="required">Email:</label>
                <input type="email" name="email" required placeholder="example@mail.com">
            </div>

            <div class="form-group">
                <label>Имя:</label>
                <input type="text" name="name" placeholder="Иван Иванов">
            </div>

            <div class="form-group">
                <label>Источник:</label>
                <select name="source">
                    <option value="">Выберите источник</option>
                    <option value="website">Веб-сайт</option>
                    <option value="manual">Ручной ввод</option>
                    <option value="import">Импорт</option>
                    <option value="api">API</option>
                </select>
            </div>

            <div class="form-group">
                <label>Заметки:</label>
                <textarea name="notes" placeholder="Дополнительная информация..."></textarea>
            </div>

            <div class="form-group checkbox-group">
                <input type="checkbox" name="is_active" checked>
                <label>Активен</label>
            </div>

            <div class="buttons">
                <button type="submit" class="btn">💾 Сохранить</button>
                <a href="/" class="btn btn-secondary">❌ Отмена</a>
            </div>
        </form>
    </div>
</body>
</html>
